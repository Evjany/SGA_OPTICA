<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - S.G.A Óptica</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">S.G.A Óptica</h1>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Tienda</a>
                </li>
                <li class="nav-item">
                    <a href="carrito.html" class="nav-link">Carrito <span id="cart-count" class="cart-badge">0</span></a>
                </li>
                <li class="nav-item">
                    <a href="citas.html" class="nav-link">Mis Citas</a>
                </li>
                <li class="nav-item">
                    <a href="login.html" class="nav-link">Login</a>
                </li>
                <li class="nav-item">
                    <a href="register.html" class="nav-link active">Registro</a>
                </li>
                <li class="nav-item">
                    <a href="productos.html" class="nav-link">Admin</a>
                </li>
                <li class="nav-item">
                    <a href="factura.html" class="nav-link">Facturación</a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="form-container">
            <div class="form-card">
                <h2>Crear Cuenta</h2>
                <form class="form">
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Repetir Contraseña</label>
                        <input type="password" id="confirm-password" name="confirm-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Registrarse</button>
                </form>
                <p class="form-footer">
                    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
                </p>
            </div>
        </div>
    </main>
    <script src="cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateCartCount();
        });
    </script>
</body>
</html>
